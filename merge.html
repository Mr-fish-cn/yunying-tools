<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格合并工具</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; min-height: 100vh; background: linear-gradient(135deg, #eff6ff 0%, #f5f3ff 100%); color: #1f2937; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
        header { text-align: center; margin-bottom: 32px; }
        header h1 { font-size: 2rem; font-weight: 700; color: #1f2937; margin-bottom: 4px; }
        header p { color: #6b7280; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
        @media (min-width: 1024px) { .grid { grid-template-columns: 2fr 1fr; } }
        .card { background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); transition: box-shadow 0.3s; }
        .card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .card-title { font-size: 1.15rem; font-weight: 600; color: #1f2937; margin-bottom: 16px; }
        .btn { padding: 8px 16px; border-radius: 8px; font-weight: 500; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 0.875rem; transition: all 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; }
        .btn-success { background: #10b981; color: #fff; }
        .btn-success:hover:not(:disabled) { background: #059669; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover:not(:disabled) { background: #dc2626; }
        .btn-outline { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; }
        .btn-outline:hover:not(:disabled) { background: rgba(59,130,246,0.1); }
        .btn-sm { padding: 4px 10px; font-size: 0.75rem; border-radius: 6px; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .drop-zone { border: 2px dashed #d1d5db; border-radius: 16px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
        .drop-zone:hover, .drop-zone.drag-over { border-color: #3b82f6; background: rgba(59,130,246,0.04); }
        .drop-zone i { font-size: 2rem; color: #9ca3af; margin-bottom: 8px; }
        .drop-zone p { color: #374151; font-weight: 500; margin-bottom: 4px; }
        .drop-zone .hint { color: #9ca3af; font-size: 0.85rem; margin-bottom: 12px; }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f3f4f6; border-radius: 8px; margin-bottom: 8px; transition: background 0.2s; }
        .file-item:hover { background: #e5e7eb; }
        .file-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .file-info i { font-size: 1.3rem; flex-shrink: 0; }
        .file-name { font-weight: 500; font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
        .file-size { font-size: 0.75rem; color: #6b7280; }
        .file-remove { background: none; border: none; color: #ef4444; cursor: pointer; padding: 4px; font-size: 1rem; }
        .file-remove:hover { color: #dc2626; }
        .setting-group { margin-bottom: 20px; }
        .setting-group label { display: block; font-weight: 500; color: #374151; margin-bottom: 6px; font-size: 0.9rem; }
        .setting-group select, .setting-group input[type="number"] { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.875rem; outline: none; transition: border-color 0.2s; }
        .setting-group select:focus, .setting-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; accent-color: #3b82f6; }
        .checkbox-group label { margin-bottom: 0; font-weight: 400; font-size: 0.85rem; }
        .progress-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
        .progress-fill { height: 100%; background: #3b82f6; transition: width 0.3s ease-out; border-radius: 4px; }
        .progress-text { font-size: 0.8rem; color: #6b7280; }
        .action-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .action-btns .btn { width: 100%; justify-content: center; padding: 10px; }
        .info-list { list-style: none; }
        .info-list li { font-size: 0.85rem; color: #6b7280; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .info-list li i { color: #3b82f6; width: 16px; text-align: center; }

        /* History */
        .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .history-header h3 { font-size: 1rem; font-weight: 600; color: #1f2937; }
        .history-entry { padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid; }
        .history-entry.success { background: #f0fdf4; border-color: #bbf7d0; }
        .history-entry.error { background: #fef2f2; border-color: #fecaca; }
        .history-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .history-time { font-weight: 500; font-size: 0.85rem; }
        .history-badge { padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
        .history-badge.success { background: #dcfce7; color: #166534; }
        .history-badge.error { background: #fee2e2; color: #991b1b; }
        .history-meta { font-size: 0.75rem; color: #6b7280; display: flex; gap: 12px; flex-wrap: wrap; }
        .history-actions { display: flex; gap: 6px; margin-top: 8px; }
        .history-details { margin-top: 6px; }
        .history-details summary { cursor: pointer; font-size: 0.75rem; color: #3b82f6; }
        .history-details summary:hover { text-decoration: underline; }
        .history-details-content { margin-top: 4px; font-size: 0.75rem; color: #6b7280; }
        .history-details-content ul { list-style: disc; padding-left: 16px; }

        /* Preview */
        .preview-section { margin-top: 24px; }
        .preview-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #e5e7eb; }
        .preview-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .preview-table th { padding: 10px 12px; text-align: left; background: #f9fafb; font-weight: 600; color: #6b7280; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; white-space: nowrap; }
        .preview-table td { padding: 8px 12px; border-top: 1px solid #f3f4f6; white-space: nowrap; color: #1f2937; }
        .preview-table tr:hover td { background: #f9fafb; }
        .preview-more { padding: 8px 12px; font-size: 0.8rem; color: #9ca3af; font-style: italic; text-align: center; }

        /* Status toast */
        .toast { position: fixed; top: 16px; right: 16px; max-width: 360px; z-index: 1000; animation: fadeIn 0.3s; }
        .toast-inner { border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
        .toast-inner.success { background: #f0fdf4; border-left: 4px solid #22c55e; color: #166534; }
        .toast-inner.error { background: #fef2f2; border-left: 4px solid #ef4444; color: #991b1b; }
        .toast-inner.warning { background: #fffbeb; border-left: 4px solid #f59e0b; color: #92400e; }
        .toast-inner.info { background: #eff6ff; border-left: 4px solid #3b82f6; color: #1e40af; }
        .toast-close { background: none; border: none; cursor: pointer; color: #9ca3af; margin-left: auto; padding: 2px; }
        .toast-close:hover { color: #6b7280; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

        /* 大文件警告弹窗 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; display: flex; align-items: center; justify-content: center; }
        .modal { background: #fff; border-radius: 16px; padding: 24px; max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal h3 { font-size: 1.1rem; margin-bottom: 12px; }
        .modal p { font-size: 0.9rem; color: #6b7280; margin-bottom: 16px; }
        .modal .btn-group { justify-content: flex-end; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fa fa-table"></i> 表格合并工具</h1>
            <p>支持 XLS、XLSX、CSV 格式的表格数据合并</p>
        </header>

        <div class="grid">
            <!-- 左侧：文件上传 + 预览 -->
            <div>
                <div class="card">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                        <span class="card-title" style="margin-bottom:0">上传文件</span>
                        <div class="btn-group">
                            <button id="clearFilesBtn" class="btn btn-outline btn-sm"><i class="fa fa-trash"></i> 清空</button>
                            <button id="uploadMoreBtn" class="btn btn-primary btn-sm"><i class="fa fa-plus"></i> 添加</button>
                        </div>
                    </div>
                    <input type="file" id="fileInput" multiple accept=".xls,.xlsx,.csv" class="hidden">

                    <div id="dropZone" class="drop-zone">
                        <i class="fa fa-cloud-upload"></i>
                        <p>拖拽文件到此处或点击上传</p>
                        <p class="hint">支持 .xls, .xlsx, .csv 格式</p>
                    </div>

                    <div style="font-size:0.85rem;color:#6b7280;margin-bottom:8px;">已添加 <span id="countNumber">0</span> 个文件</div>
                    <div id="fileList" style="max-height:240px;overflow-y:auto;"></div>

                    <!-- 合并历史 -->
                    <div id="mergeHistory" class="hidden" style="margin-top:20px;">
                        <div class="history-header">
                            <h3><i class="fa fa-history"></i> 合并历史</h3>
                            <button id="clearHistoryBtn" class="btn btn-danger btn-sm" title="清除所有历史"><i class="fa fa-trash"></i> 清除全部</button>
                        </div>
                        <div id="historyList" style="max-height:300px;overflow-y:auto;"></div>
                    </div>
                </div>

                <!-- 预览 -->
                <div id="previewSection" class="card preview-section hidden">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                        <span class="card-title" style="margin-bottom:0">预览数据</span>
                        <span id="previewInfo" style="font-size:0.8rem;color:#6b7280;"></span>
                    </div>
                    <div class="preview-table-wrap">
                        <table class="preview-table">
                            <thead><tr id="previewHeader"></tr></thead>
                            <tbody id="previewBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 右侧：设置 + 操作 -->
            <div>
                <div class="card">
                    <div class="card-title">合并设置</div>

                    <div class="setting-group">
                        <label>工作表选择</label>
                        <select id="sheetSelect">
                            <option value="first">使用第一个工作表</option>
                            <option value="all">合并所有工作表</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label>表头处理</label>
                        <select id="headerSelect">
                            <option value="first">仅保留第一个文件的表头</option>
                            <option value="all">每个文件的第一行也当数据</option>
                            <option value="none">不保留表头（全部当数据）</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label>列映射方式</label>
                        <select id="mappingSelect">
                            <option value="position">按位置匹配</option>
                            <option value="name">按列名匹配</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label>跳过前 N 行</label>
                        <input type="number" id="skipRows" value="0" min="0" max="100" placeholder="0">
                    </div>

                    <div class="setting-group">
                        <label>CSV 编码</label>
                        <select id="csvEncoding">
                            <option value="auto">自动检测</option>
                            <option value="utf-8">UTF-8</option>
                            <option value="gbk">GBK（中文Windows）</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="addSourceCol" checked>
                            <label for="addSourceCol">添加"来源文件"列</label>
                        </div>
                    </div>

                    <div id="progressSection" class="hidden">
                        <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
                        <div id="progressText" class="progress-text">准备中...</div>
                    </div>

                    <div class="action-btns">
                        <button id="mergeBtn" class="btn btn-primary" disabled><i class="fa fa-table"></i> 开始合并</button>
                        <button id="previewBtn" class="btn btn-outline" disabled><i class="fa fa-eye"></i> 预览结果</button>
                        <button id="downloadBtn" class="btn btn-success" disabled><i class="fa fa-download"></i> 下载结果</button>
                    </div>
                </div>

                <div class="card" style="margin-top:16px;">
                    <div class="card-title">使用说明</div>
                    <ul class="info-list">
                        <li><i class="fa fa-check-circle"></i> 支持多文件批量合并</li>
                        <li><i class="fa fa-check-circle"></i> 按列名匹配可合并不同列结构的表格</li>
                        <li><i class="fa fa-check-circle"></i> CSV 文件支持 GBK 编码自动识别</li>
                        <li><i class="fa fa-check-circle"></i> 合并历史可单独下载或清除</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script>
    class TableMerger {
        constructor() {
            this.files = [];
            this.mergedData = null;
            this.fileNames = new Set();
            this.historyData = [];

            this.els = {};
            this.initElements();
            this.bindEvents();
        }

        initElements() {
            const ids = ['fileInput','dropZone','fileList','countNumber','mergeHistory','historyList',
                'mergeBtn','downloadBtn','previewBtn','clearFilesBtn','uploadMoreBtn',
                'previewSection','previewHeader','previewBody','previewInfo',
                'progressSection','progressFill','progressText','sheetSelect','headerSelect',
                'mappingSelect','skipRows','csvEncoding','addSourceCol','clearHistoryBtn','toast'];
            ids.forEach(id => this.els[id] = document.getElementById(id));
        }

        bindEvents() {
            const e = this.els;
            e.uploadMoreBtn.onclick = () => e.fileInput.click();
            e.dropZone.onclick = () => e.fileInput.click();
            e.fileInput.onchange = (ev) => { this.handleFiles(Array.from(ev.target.files)); ev.target.value = ''; };
            e.dropZone.ondragover = (ev) => { ev.preventDefault(); e.dropZone.classList.add('drag-over'); };
            e.dropZone.ondragleave = () => e.dropZone.classList.remove('drag-over');
            e.dropZone.ondrop = (ev) => {
                ev.preventDefault(); e.dropZone.classList.remove('drag-over');
                this.handleFiles(Array.from(ev.dataTransfer.files).filter(f => /\.(xls|xlsx|csv)$/i.test(f.name)));
            };
            e.mergeBtn.onclick = () => this.startMerge();
            e.downloadBtn.onclick = () => this.downloadResult();
            e.previewBtn.onclick = () => this.showPreview();
            e.clearFilesBtn.onclick = () => this.clearFiles();
            e.clearHistoryBtn.onclick = () => this.clearHistory();
            ['sheetSelect','headerSelect','mappingSelect'].forEach(id => {
                document.getElementById(id).onchange = () => this.updateButtons();
            });
        }

        // ===== 文件管理 =====
        handleFiles(files) {
            const newFiles = files.filter(f => !this.fileNames.has(f.name) && /\.(xls|xlsx|csv)$/i.test(f.name));
            if (!newFiles.length) { this.toast('没有新文件可添加', 'warning'); return; }
            // 大文件检查
            const bigFiles = newFiles.filter(f => f.size > 10 * 1024 * 1024);
            if (bigFiles.length) {
                this.showBigFileWarning(bigFiles, newFiles);
                return;
            }
            this._addFiles(newFiles);
        }

        _addFiles(files) {
            files.forEach(f => {
                this.files.push(f);
                this.fileNames.add(f.name);
                this.renderFileItem(f);
            });
            this.updateButtons();
            this.toast(`已添加 ${files.length} 个文件`, 'success');
        }

        showBigFileWarning(bigFiles, allNewFiles) {
            const names = bigFiles.map(f => `${f.name} (${this.fmtSize(f.size)})`).join('、');
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal">
                    <h3><i class="fa fa-exclamation-triangle" style="color:#f59e0b"></i> 大文件警告</h3>
                    <p>以下文件超过 10MB，处理可能较慢或导致浏览器卡顿：<br><strong>${names}</strong></p>
                    <p>确定要继续添加吗？</p>
                    <div class="btn-group">
                        <button class="btn btn-outline btn-sm" id="modalCancel">取消</button>
                        <button class="btn btn-primary btn-sm" id="modalConfirm">继续添加</button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('#modalCancel').onclick = () => overlay.remove();
            overlay.querySelector('#modalConfirm').onclick = () => { overlay.remove(); this._addFiles(allNewFiles); };
        }

        renderFileItem(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            const icon = ext === 'csv' ? '<i class="fa fa-file-text-o" style="color:#3b82f6"></i>' : '<i class="fa fa-file-excel-o" style="color:#16a34a"></i>';
            const div = document.createElement('div');
            div.className = 'file-item';
            div.dataset.filename = file.name;
            div.innerHTML = `
                <div class="file-info">
                    ${icon}
                    <div>
                        <div class="file-name" title="${file.name}">${file.name}</div>
                        <div class="file-size">${this.fmtSize(file.size)}</div>
                    </div>
                </div>
                <button class="file-remove" title="移除"><i class="fa fa-times"></i></button>`;
            div.querySelector('.file-remove').onclick = () => this.removeFile(file.name);
            this.els.fileList.appendChild(div);
        }

        removeFile(name) {
            this.files = this.files.filter(f => f.name !== name);
            this.fileNames.delete(name);
            const el = this.els.fileList.querySelector(`[data-filename="${name}"]`);
            if (el) el.remove();
            this.updateButtons();
            this.toast(`已移除: ${name}`, 'warning');
        }

        clearFiles() {
            this.files = [];
            this.fileNames.clear();
            this.els.fileList.innerHTML = '';
            this.mergedData = null;
            this.els.previewSection.classList.add('hidden');
            this.updateButtons();
            this.toast('已清空所有文件', 'success');
        }

        fmtSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024, units = ['B','KB','MB','GB'];
            let i = 0;
            while (bytes >= k && i < 3) { bytes /= k; i++; }
            return bytes.toFixed(i ? 1 : 0) + ' ' + units[i];
        }

        updateButtons() {
            const has = this.files.length > 0;
            this.els.mergeBtn.disabled = !has;
            this.els.previewBtn.disabled = !has;
            this.els.downloadBtn.disabled = !this.mergedData;
            this.els.countNumber.textContent = this.files.length;
        }

        // ===== 合并核心 =====
        getSettings() {
            return {
                sheetSelection: this.els.sheetSelect.value,
                headerHandling: this.els.headerSelect.value,
                columnMapping: this.els.mappingSelect.value,
                skipRows: parseInt(this.els.skipRows.value) || 0,
                csvEncoding: this.els.csvEncoding.value,
                addSource: this.els.addSourceCol.checked
            };
        }

        async startMerge() {
            if (!this.files.length) return;
            this.showProgress('开始处理...', 0);
            this.els.mergeBtn.disabled = true;
            const settings = this.getSettings();
            const startTime = Date.now();

            try {
                // 1. 读取所有文件
                const fileResults = [];
                for (let i = 0; i < this.files.length; i++) {
                    const f = this.files[i];
                    this.showProgress(`读取文件 ${i+1}/${this.files.length}: ${f.name}`, Math.round(i / this.files.length * 80));
                    const wb = await this.readFile(f, settings);
                    const sheets = settings.sheetSelection === 'first' ? [wb.Sheets[wb.SheetNames[0]]] : wb.SheetNames.map(n => wb.Sheets[n]);
                    for (const sheet of sheets) {
                        const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                        const parsed = this.parseSheet(raw, settings, f.name);
                        if (parsed) fileResults.push(parsed);
                    }
                    await this.sleep(30);
                }

                // 2. 合并
                this.showProgress('合并数据...', 90);
                const merged = this.mergeAll(fileResults, settings);
                this.mergedData = merged;

                // 3. 记录历史
                const duration = ((Date.now() - startTime) / 1000).toFixed(1);
                this.addHistory({
                    id: Date.now(),
                    time: new Date(),
                    status: 'success',
                    fileCount: this.files.length,
                    totalRows: merged.length - (settings.headerHandling !== 'none' ? 1 : 0),
                    duration: parseFloat(duration),
                    files: this.files.map(f => f.name),
                    settings: { ...settings },
                    data: merged  // 保存数据用于单独下载
                });

                this.showProgress('完成！', 100);
                this.els.downloadBtn.disabled = false;
                this.toast(`合并成功！共 ${this.mergedData.length - (settings.headerHandling !== 'none' ? 1 : 0)} 行数据`, 'success');
                setTimeout(() => { this.hideProgress(); this.els.mergeBtn.disabled = false; }, 800);
            } catch (err) {
                console.error(err);
                this.addHistory({
                    id: Date.now(), time: new Date(), status: 'error',
                    fileCount: this.files.length, totalRows: 0, duration: 0,
                    error: err.message, files: this.files.map(f => f.name)
                });
                this.toast('合并失败: ' + err.message, 'error');
                this.hideProgress();
                this.els.mergeBtn.disabled = false;
            }
        }

        readFile(file, settings) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        if (file.name.toLowerCase().endsWith('.csv')) {
                            // CSV 特殊处理编码
                            const encoding = this.detectEncoding(e.target.result, settings.csvEncoding);
                            const decoder = new TextDecoder(encoding);
                            const text = decoder.decode(e.target.result);
                            const wb = XLSX.read(text, { type: 'string' });
                            resolve(wb);
                        } else {
                            const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                            resolve(wb);
                        }
                    } catch (err) { reject(new Error(`读取失败: ${file.name} - ${err.message}`)); }
                };
                reader.onerror = () => reject(new Error(`文件读取错误: ${file.name}`));
                reader.readAsArrayBuffer(file);
            });
        }

        detectEncoding(buffer, setting) {
            if (setting === 'utf-8') return 'utf-8';
            if (setting === 'gbk') return 'gbk';
            // 自动检测：尝试 UTF-8，如果出现替换字符则回退 GBK
            try {
                const text = new TextDecoder('utf-8', { fatal: true }).decode(buffer);
                return 'utf-8';
            } catch {
                return 'gbk';
            }
        }

        parseSheet(rawData, settings, fileName) {
            if (!rawData || !rawData.length) return null;

            // 跳过前 N 行
            const skip = settings.skipRows || 0;
            const data = rawData.slice(skip);

            // 过滤空行
            const nonEmpty = data.filter(row => row.some(c => c !== undefined && c !== null && String(c).trim() !== ''));
            if (!nonEmpty.length) return null;

            const headerMode = settings.headerHandling;
            let header, rows;

            if (headerMode === 'first') {
                header = nonEmpty[0].map(c => c === undefined || c === null ? '' : String(c));
                rows = nonEmpty.slice(1);
            } else if (headerMode === 'all') {
                // 所有行都当数据，无表头
                header = null;
                rows = nonEmpty;
            } else {
                // none: 不保留表头
                header = null;
                rows = nonEmpty;
            }

            return { header, rows, fileName };
        }

        mergeAll(fileResults, settings) {
            if (!fileResults.length) return [];

            if (settings.columnMapping === 'name') {
                return this.mergeByName(fileResults, settings);
            }
            return this.mergeByPosition(fileResults, settings);
        }

        mergeByPosition(fileResults, settings) {
            const result = [];
            const addSource = settings.addSource;

            // 收集所有列名用于表头（按名称模式下可能需要）
            let globalHeader = null;

            for (let fi = 0; fi < fileResults.length; fi++) {
                const fr = fileResults[fi];
                const isFirst = fi === 0;

                // 确定表头
                if (settings.headerHandling === 'first' && fr.header) {
                    if (!globalHeader) {
                        globalHeader = addSource ? [...fr.header, '来源文件'] : [...fr.header];
                        result.push(globalHeader);
                    }
                    // 数据行
                    for (const row of fr.rows) {
                        const newRow = row.map(c => c === undefined || c === null ? '' : c);
                        // 补齐列数
                        while (newRow.length < globalHeader.length - (addSource ? 1 : 0)) newRow.push('');
                        if (addSource) newRow.push(fr.fileName);
                        result.push(newRow);
                    }
                } else if (settings.headerHandling === 'first' && !fr.header) {
                    // 后续文件没有 header（理论上不会走到）
                    for (const row of fr.rows) {
                        const newRow = row.map(c => c === undefined || c === null ? '' : c);
                        while (globalHeader && newRow.length < globalHeader.length - (addSource ? 1 : 0)) newRow.push('');
                        if (addSource) newRow.push(fr.fileName);
                        result.push(newRow);
                    }
                } else {
                    // headerHandling === 'all' 或 'none'
                    if (isFirst && fr.header && settings.headerHandling === 'all') {
                        // all 模式下第一个文件的 header 也当数据行
                        const hRow = fr.header.map(c => c || '');
                        if (addSource) hRow.push(fr.fileName);
                        result.push(hRow);
                    }
                    for (const row of fr.rows) {
                        const newRow = row.map(c => c === undefined || c === null ? '' : c);
                        if (addSource) newRow.push(fr.fileName);
                        result.push(newRow);
                    }
                }
            }

            // 补齐列宽
            if (result.length > 1) {
                const maxCol = Math.max(...result.map(r => r.length));
                result.forEach(r => { while (r.length < maxCol) r.push(''); });
            }

            return result;
        }

        mergeByName(fileResults, settings) {
            const addSource = settings.addSource;
            // 1. 收集所有列名并集（保持首次出现顺序）
            const columnOrder = [];
            const columnSet = new Set();

            for (const fr of fileResults) {
                if (fr.header) {
                    for (const col of fr.header) {
                        const c = String(col).trim();
                        if (c && !columnSet.has(c)) {
                            columnSet.add(c);
                            columnOrder.push(c);
                        }
                    }
                }
            }

            // 如果没有表头（all/none 模式），退化为按位置合并
            if (!columnOrder.length) {
                return this.mergeByPosition(fileResults, settings);
            }

            // 2. 构建结果
            const result = [];
            // 表头行
            const headerRow = [...columnOrder];
            if (addSource) headerRow.push('来源文件');
            result.push(headerRow);

            // 3. 每个文件的数据行按列名映射
            for (const fr of fileResults) {
                if (!fr.header) continue;
                // 建立当前文件列名→索引的映射
                const colIndex = new Map();
                fr.header.forEach((col, idx) => {
                    const c = String(col).trim();
                    if (c) colIndex.set(c, idx);
                });

                for (const row of fr.rows) {
                    const newRow = new Array(columnOrder.length).fill('');
                    for (let ci = 0; ci < columnOrder.length; ci++) {
                        const colName = columnOrder[ci];
                        const srcIdx = colIndex.get(colName);
                        if (srcIdx !== undefined && srcIdx < row.length) {
                            const val = row[srcIdx];
                            newRow[ci] = val === undefined || val === null ? '' : val;
                        }
                    }
                    if (addSource) newRow.push(fr.fileName);
                    result.push(newRow);
                }
            }

            return result;
        }

        // ===== 预览 =====
        showPreview() {
            if (!this.mergedData || !this.mergedData.length) {
                this.toast('没有可预览的数据，请先合并', 'warning');
                return;
            }
            this.renderPreview(this.mergedData);
            this.els.previewSection.classList.remove('hidden');
            this.els.previewSection.scrollIntoView({ behavior: 'smooth' });
        }

        renderPreview(data) {
            const h = this.els.previewHeader;
            const b = this.els.previewBody;
            h.innerHTML = '';
            b.innerHTML = '';
            if (!data.length) return;

            const headers = data[0];
            headers.forEach((val, i) => {
                const th = document.createElement('th');
                th.textContent = val || `列${i + 1}`;
                h.appendChild(th);
            });

            this.els.previewInfo.textContent = `共 ${data.length - 1} 行 × ${headers.length} 列`;

            const maxPreview = 20;
            const rows = data.slice(1, maxPreview + 1);
            rows.forEach(row => {
                const tr = document.createElement('tr');
                headers.forEach((_, ci) => {
                    const td = document.createElement('td');
                    td.textContent = ci < row.length ? row[ci] : '';
                    tr.appendChild(td);
                });
                b.appendChild(tr);
            });

            if (data.length - 1 > maxPreview) {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.className = 'preview-more';
                td.colSpan = headers.length;
                td.textContent = `... 还有 ${data.length - 1 - maxPreview} 行未显示`;
                tr.appendChild(td);
                b.appendChild(tr);
            }
        }

        // ===== 下载 =====
        downloadResult() {
            if (!this.mergedData) return;
            this.downloadData(this.mergedData, `合并表格-${this.timestamp()}.xlsx`);
        }

        downloadData(data, filename) {
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, '合并数据');
            XLSX.writeFile(wb, filename);
            this.toast('下载成功', 'success');
        }

        timestamp() {
            const d = new Date();
            return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
        }

        // ===== 历史记录 =====
        addHistory(item) {
            this.historyData.unshift(item);
            if (this.historyData.length > 20) this.historyData.pop();
            this.els.mergeHistory.classList.remove('hidden');
            this.renderHistory();
        }

        renderHistory() {
            const list = this.els.historyList;
            list.innerHTML = '';
            this.historyData.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = `history-entry ${item.status}`;
                div.dataset.idx = idx;
                const timeStr = item.time.toLocaleString('zh-CN');
                const statusText = item.status === 'success' ? '成功' : '失败';
                div.innerHTML = `
                    <div class="history-top">
                        <span class="history-time">${timeStr}</span>
                        <span class="history-badge ${item.status}">${statusText}</span>
                    </div>
                    <div class="history-meta">
                        <span>文件: ${item.fileCount}</span>
                        <span>耗时: ${item.duration}s</span>
                        ${item.status === 'success' ? `<span>数据行: ${item.totalRows}</span>` : `<span>错误: ${item.error || '未知'}</span>`}
                    </div>
                    <div class="history-actions">
                        ${item.status === 'success' && item.data ? `<button class="btn btn-success btn-sm history-download"><i class="fa fa-download"></i> 下载</button>` : ''}
                        <button class="btn btn-outline btn-sm history-delete"><i class="fa fa-trash"></i> 删除</button>
                    </div>
                    <details class="history-details">
                        <summary>查看详情</summary>
                        <div class="history-details-content">
                            <p style="margin-bottom:4px">处理的文件:</p>
                            <ul>${(item.files||[]).map(f => `<li>${f}</li>`).join('')}</ul>
                            ${item.status === 'success' && item.settings ? `
                            <p style="margin:6px 0 4px">合并设置:</p>
                            <ul>
                                <li>工作表: ${item.settings.sheetSelection === 'first' ? '第一个' : '所有'}</li>
                                <li>表头: ${{first:'仅第一个',all:'全部当数据',none:'不保留'}[item.settings.headerHandling]}</li>
                                <li>映射: ${item.settings.columnMapping === 'position' ? '按位置' : '按列名'}</li>
                                <li>来源列: ${item.settings.addSource ? '有' : '无'}</li>
                            </ul>` : ''}
                        </div>
                    </details>`;

                // 下载按钮
                const dlBtn = div.querySelector('.history-download');
                if (dlBtn) {
                    dlBtn.onclick = () => {
                        const ts = item.time instanceof Date ? this._fmtTime(item.time) : this.timestamp();
                        this.downloadData(item.data, `合并记录-${ts}.xlsx`);
                    };
                }
                // 删除按钮
                div.querySelector('.history-delete').onclick = () => {
                    this.historyData.splice(idx, 1);
                    if (!this.historyData.length) this.els.mergeHistory.classList.add('hidden');
                    this.renderHistory();
                    this.toast('已删除该记录', 'success');
                };

                list.appendChild(div);
            });
        }

        _fmtTime(d) {
            return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
        }

        clearHistory() {
            if (!this.historyData.length) return;
            this.historyData = [];
            this.els.historyList.innerHTML = '';
            this.els.mergeHistory.classList.add('hidden');
            this.toast('已清除所有历史记录', 'success');
        }

        // ===== 工具方法 =====
        showProgress(msg, pct) {
            this.els.progressSection.classList.remove('hidden');
            this.els.progressFill.style.width = pct + '%';
            this.els.progressText.textContent = msg;
        }

        hideProgress() {
            this.els.progressSection.classList.add('hidden');
        }

        toast(msg, type = 'info') {
            const t = this.els.toast;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            t.className = 'toast';
            t.innerHTML = `
                <div class="toast-inner ${type}">
                    <i class="fa ${icons[type]}" style="font-size:1.1rem;flex-shrink:0"></i>
                    <span style="flex:1;font-size:0.9rem">${msg}</span>
                    <button class="toast-close" onclick="merger.els.toast.classList.add('hidden')"><i class="fa fa-times"></i></button>
                </div>`;
            clearTimeout(this._toastTimer);
            this._toastTimer = setTimeout(() => t.classList.add('hidden'), 3000);
        }

        sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    }

    let merger;
    document.addEventListener('DOMContentLoaded', () => { merger = new TableMerger(); });
    </script>
</body>
</html>
