<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>发货表格生成器</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.wrap{max-width:1200px;margin:0 auto;padding:20px}
h1{font-size:22px;font-weight:600;margin-bottom:20px;color:#1a1a1a}
.card{background:#fff;border-radius:10px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px;color:#1a1a1a;padding-bottom:10px;border-bottom:1px solid #eee}
.upload-zone{border:2px dashed #d0d0d0;border-radius:10px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:#4a90d9;background:#f0f7ff}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-zone p{font-size:15px;color:#666}
.upload-zone .hint{font-size:13px;color:#999;margin-top:6px}
.file-info{margin-top:12px;padding:10px 14px;background:#f0f7ff;border-radius:6px;font-size:13px;color:#4a90d9;display:none}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.form-item{display:flex;flex-direction:column;gap:6px}
.form-item label{font-size:13px;color:#555;font-weight:500}
.form-item label .req{color:#e74c3c;margin-left:2px}
.form-item input,.form-item select{height:36px;padding:0 10px;border:1px solid #d0d0d0;border-radius:6px;font-size:14px;outline:none;transition:border .2s}
.form-item input:focus,.form-item select:focus{border-color:#4a90d9}
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn{height:38px;padding:0 24px;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#4a90d9;color:#fff}.btn-primary:hover{background:#3a7bc8}
.btn-success{background:#27ae60;color:#fff}.btn-success:hover{background:#219a52}
.btn-warn{background:#f39c12;color:#fff}.btn-warn:hover{background:#e08e0b}
.btn:disabled{opacity:.5;cursor:not-allowed}
.preview-wrap{overflow-x:auto;margin-top:12px}
table.preview{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
table.preview th{background:#f5f7fa;padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid #e0e0e0;position:sticky;top:0}
table.preview td{padding:6px 10px;border-bottom:1px solid #eee}
table.preview tr:hover td{background:#f9fbfd}
.stats{font-size:13px;color:#888;margin-bottom:10px}
.stats b{color:#333}
.empty-msg{text-align:center;padding:40px;color:#999;font-size:14px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-ok{background:#e8f5e9;color:#27ae60}
.tag-warn{background:#fff3e0;color:#f39c12}
</style>
</head>
<body>
<div class="wrap">
<h1>发货表格生成器</h1>

<!-- 上传区域 -->
<div class="card">
  <h2>1. 上传数据表格</h2>
  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
    <p>点击或拖拽上传数据表格</p>
    <div class="hint">支持 .xlsx / .xls / .csv</div>
  </div>
  <div class="file-info" id="fileInfo"></div>
</div>

<!-- 手动录入 -->
<div class="card" id="paramCard">
  <h2>2. 手动填写参数</h2>
  <div class="form-grid">
    <div class="form-item">
      <label>发货人电话<span class="req">*</span></label>
      <input type="tel" id="senderPhone" placeholder="填写发货人电话号码">
    </div>
    <div class="form-item">
      <label>达到天数<span class="req">*</span></label>
      <select id="deliverDays">
        <option value="">请选择</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>
    </div>
    <div class="form-item">
      <label>货值（元）<span class="req">*</span></label>
      <input type="number" id="cargoValue" placeholder="填写货值金额" step="0.01" min="0">
    </div>
    <div class="form-item">
      <label>自动签收</label>
      <select id="autoSign">
        <option value="是">是</option>
        <option value="否">否</option>
      </select>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnGen" disabled onclick="generate()">生成表格</button>
    <button class="btn btn-success" id="btnExport" disabled onclick="exportXlsx()">导出 Excel</button>
  </div>
</div>

<!-- 预览 -->
<div class="card">
  <h2>3. 预览与导出</h2>
  <div class="stats" id="stats"></div>
  <div class="preview-wrap" style="max-height:500px;overflow-y:auto">
    <div id="previewArea"><div class="empty-msg">上传数据表格并填写参数后，点击「生成表格」预览</div></div>
  </div>
</div>
</div>

<script>
// ====== 列名映射：源列名 → 目标列名 ======
const COL_MAP = {
  '发货人姓名': '发货人姓名',
  '发货人地址': '发货人地址',
  '发货人城市': '发货人城市',
  '发货邮编': '发货邮编',
  '发货人省份': '发货人省份',
  '收货人姓名': '收货人姓名',
  '收货人电话': '收货人电话',
  '收货人地址': '收货人地址',
  '收货人省份': '收货人省份',
  '收货人城市': '收货人城市',
  '收件人邮编': '收件人邮编',
  '重量(kg)':  '重量(kg)',
  '平台订单号': '平台订单号'
};

// 目标表头（最终顺序）
const TARGET_COLS = [
  '平台','平台订单号','发货人姓名','发货人电话','发货人地址','发货人省份',
  '发货人城市','发货邮编','收货人姓名','收货人电话','收货人地址','收货人省份',
  '收货人城市','收件人邮编','达到天数','货物名称','重量(kg)','数量','货值(元)',
  '备注','自动签收'
];

let srcRows = [];   // 上传的源数据
let outRows = [];   // 生成的目标数据

// ====== 文件上传 ======
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['xlsx','xls','csv'].includes(ext)) { alert('请上传 xlsx/xls/csv 文件'); return; }

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!json.length) { alert('表格为空，请检查文件'); return; }
      srcRows = json;
      fileInfo.style.display = 'block';
      fileInfo.innerHTML = '已加载 <b>' + file.name + '</b>，共 <b>' + json.length + '</b> 行数据，表头：' + Object.keys(json[0]).join('、');
      checkReady();
    } catch (err) {
      alert('解析失败：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ====== 参数校验 ======
['senderPhone','deliverDays','cargoValue'].forEach(id => {
  document.getElementById(id).addEventListener('input', checkReady);
  document.getElementById(id).addEventListener('change', checkReady);
});

function checkReady() {
  const phone = document.getElementById('senderPhone').value.trim();
  const days = document.getElementById('deliverDays').value;
  const val = document.getElementById('cargoValue').value;
  document.getElementById('btnGen').disabled = !(srcRows.length && phone && days && val);
}

// ====== 生成 ======
function generate() {
  const phone = document.getElementById('senderPhone').value.trim();
  const days = document.getElementById('deliverDays').value;
  const val = parseFloat(document.getElementById('cargoValue').value) || 0;
  const sign = document.getElementById('autoSign').value;

  outRows = srcRows.map(src => {
    const row = {};
    // 平台固定
    row['平台'] = 'Shein';
    // 从源数据映射
    for (const [srcCol, tgtCol] of Object.entries(COL_MAP)) {
      row[tgtCol] = src[srcCol] !== undefined ? src[srcCol] : '';
    }
    // 手动/固定值
    row['发货人电话'] = phone;
    row['达到天数'] = parseInt(days);
    row['货物名称'] = '';
    row['数量'] = 1;
    row['货值(元)'] = val;
    row['备注'] = '';
    row['自动签收'] = sign;
    return row;
  });

  renderPreview();
  document.getElementById('btnExport').disabled = false;
}

function renderPreview() {
  const area = document.getElementById('previewArea');
  if (!outRows.length) { area.innerHTML = '<div class="empty-msg">无数据</div>'; return; }
  document.getElementById('stats').innerHTML = '共 <b>' + outRows.length + '</b> 行数据';

  let html = '<table class="preview"><thead><tr>';
  TARGET_COLS.forEach(c => html += '<th>' + c + '</th>');
  html += '</tr></thead><tbody>';

  // 最多预览前 200 行
  const show = outRows.slice(0, 200);
  show.forEach(r => {
    html += '<tr>';
    TARGET_COLS.forEach(c => {
      let v = r[c];
      if (v === undefined || v === null) v = '';
      html += '<td>' + v + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  if (outRows.length > 200) html += '<div class="empty-msg">仅预览前200行，导出Excel包含全部 ' + outRows.length + ' 行</div>';
  area.innerHTML = html;
}

// ====== 导出 ======
function exportXlsx() {
  if (!outRows.length) return;
  const wsData = [TARGET_COLS];
  outRows.forEach(r => {
    wsData.push(TARGET_COLS.map(c => r[c] !== undefined ? r[c] : ''));
  });
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  // 设置列宽
  ws['!cols'] = TARGET_COLS.map(c => {
    if (c.includes('地址') || c.includes('姓名')) return { wch: 18 };
    if (c.includes('电话') || c.includes('邮编')) return { wch: 14 };
    if (c === '平台订单号') return { wch: 20 };
    return { wch: 10 };
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '发货数据');

  const now = new Date();
  const ts = now.getFullYear() + '' + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '_' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0');
  XLSX.writeFile(wb, '发货表格_' + ts + '.xlsx');
}
</script>
</body>
</html>
